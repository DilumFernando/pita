# @package _global_

training:
  n_walkers: 512
  steps: 100
  epsilon: 0.01
  K: 50
  modal_loss_weight: 0.0
  modal_loss_end_fraction: 0.0
  loss_type: manual

data:
  target: aldp
  run_name: aldp
  dim: 66
  num_components: 0
  n_particles: 22
  spatial_dim: 3
  temperature: 300.0
  should_normalize: true
  normalization_factor: 0.1640
  should_remove_mean: true
  train_path: data/alanine/AL22_temp_300.00/train_split_AL22-10000.npy
  val_path: data/alanine/AL22_temp_300.00/val_split_AL22-10000.npy
  test_path: data/alanine/AL22_temp_300.00/test_split_AL22-10000.npy
  pdb_path: data/pdbs/A_capped.pdb
  mode_centers_path: null
  num_mode_centers: 4
  mode_estimation_samples: 10000
  mode_strategy: canonical_rama
  energy_batch_size: 1024
  openmm_platform: CPU
  device_index: 0
  true_sample_count: 512

model:
  interpolation_kind: fixed
  beta_max: 1.0
  perturbation: 0.0
  use_time_logits: false
  drift:
    architecture: dit
    hidden_size: 192
    cond_dim: 64
    n_blocks: 6
    n_heads: 6
    dropout: 0.1

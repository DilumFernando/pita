training:
  n_walkers: 500
  steps: 50
  epsilon: 4.0
  K: 50
  modal_loss_weight: 100000.0
  modal_loss_end_fraction: 0.4
  loss_type: manual

data:
  target: gmm
  dim: 16
  num_components: 2
  covs: null
  weights: [0.5, 0.5]
  means_source: null
  apply_mean_layout: true
  mean_layout: pair_shift
  layout_scale: 10.0
  perturb_mean: 10.0
  true_sample_count: 2000
  covariance:
    style: scaled_identity
    scales: [1.0, 4.0]
    diagonal_scales: null
    random_rotation_per_component: true

model:
  interpolation_kind: alps
  beta_max_learnable: true
  perturbation: 0.0
  use_time_logits: false

training:
  n_walkers: 2000
  steps: 100
  epsilon: 4.0
  K: 50
  modal_loss_weight: 0.0
  modal_loss_end_fraction: 0.6
  loss_type: manual

data:
  dim: 2
  num_components: 2
  covs: null
  weights: [0.5, 0.5]
  means_source: null
  apply_mean_layout: true
  mean_layout: pair_shift
  layout_scale: 10.0
  perturb_mean: 10.0
  true_sample_count: 2000
  covariance:
    style: rotated_full
    scales: null
    diagonal_scales: null
    base_covariances:
      - [[1.0, 0.4], [0.4, 3.0]]
      - [[4.0, -0.8], [-0.8, 1.5]]
    random_rotation_per_component: true

model:
  interpolation_kind: alps
  beta_max_learnable: true
  perturbation: 0.0
  use_time_logits: false
